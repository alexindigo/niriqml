name: CI

on:
  push:
    branches: [master]
  pull_request:
    branches: [master]

jobs:
  build-test:
    runs-on: ubuntu-24.04
    steps:
      - uses: actions/checkout@v4

      - name: Install Qt
        uses: jurplel/install-qt-action@v4
        with:
          version: "6.10.*"
          cache: true

      - name: Install system deps
        run: sudo apt-get update -qq && sudo apt-get install -y lcov cmake ninja-build libgl1-mesa-dev libdbus-1-dev libxkbcommon-dev

      - name: Debug Qt install
        run: |
          echo "QT_ROOT_DIR=$QT_ROOT_DIR"
          echo "CMAKE_PREFIX_PATH=$CMAKE_PREFIX_PATH"
          ls "$QT_ROOT_DIR/lib/cmake/" 2>/dev/null || echo "no cmake dir"

      - name: Configure
        run: |
          cmake -B build -S . \
            -DCMAKE_BUILD_TYPE=Debug \
            -DBUILD_TEST_MODE=ON \
            -G Ninja \
            --log-level=DEBUG 2>&1 | tail -5

      - name: Build
        run: cmake --build build -j$(nproc) --verbose 2>&1 | tail -30 || true

      - name: Build failure diagnosis
        if: failure()
        run: cmake --build build -j1 2>&1 | tail -40

  lint:
    runs-on: ubuntu-24.04
    steps:
      - uses: actions/checkout@v4

      - name: Install clang-format
        run: sudo apt-get update -qq && sudo apt-get install -y clang-format-20

      - name: clang-format check
        run: clang-format-20 --dry-run --Werror niri*.cpp niri*.h tests/*.cpp tests/*.h
